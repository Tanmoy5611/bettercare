<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Edit Profile</title>
  <link rel="stylesheet" th:href="@{/css/custom.css}">
  <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
</head>
<body class="bg-light">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container py-4">

  <h1 th:text="#{editProfile}">Edit Profile</h1>

  <div class="card">
    <div class="card-body">
      <form th:action="@{/update/{id}(id=${profile.profileId})}" method="post">
    <div class="mb-3">
      <label class="form-label" th:text="#{name}">Name</label>
      <input type="text" class="form-control" th:value="${profile.name}" name="name" required />
    </div>

    <div class="mb-3">
      <label class="form-label" th:text="#{age}">Age</label>
      <input type="number" class="form-control" th:value="${profile.age}" name="age" min="0" />
    </div>

    <div class="mb-3">
      <label class="form-label" th:text="#{skinColor}">Skin Color</label>
      <select class="form-select" name="skinColor" required>
        <option th:each="sc : ${skinColors}" th:value="${sc}" th:text="${sc}" th:selected="${sc == profile.skinColor}"></option>
      </select>
    </div>


        <button type="submit" class="btn btn-success" th:text="#{saveChanges}">Save changes</button>
        <a href="/userProfile" class="btn btn-secondary" th:text="#{cancel}">Cancel</a>
      </form>
    </div>
  </div>

</div>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
