explainSensor1 = Terwijl vervuiling uw ademhalingssysteem be\u00EFnvloedt, volgt de UV-index huidbeschadigende straling. Hoge niveaus van beide tegelijkertijd veroorzaken "oxidatieve stress", waardoor het extra belangrijk is om gehydrateerd te blijven en huidbescherming te gebruiken.
explainSensor2 = Vervuiling wordt gemeten via de Air Quality Index (AQI). Een UV-index boven de 6 vereist zonbescherming, zelfs op koele of bewolkte dagen, omdat wolken vaak de schadelijke UVA/UVB-stralen in de bovenstaande trends niet blokkeren.
explainTraffic1 = Blootstelling aan hoge vervuilingsniveaus tijdens de spits kan de belasting van de luchtwegen met wel 30% verhogen tijdens het sporten in de buitenlucht.
explainTraffic2 = Real-time sensorgegevens worden elke 5 minuten gesynchroniseerd met de verkeersgegevens van Antwerpen en lokale omgevingssensoren.