explainSensor1 = While Pollution affects your respiratory system, the UV Index tracks skin-damaging radiation. High levels of both simultaneously create "oxidative stress," making it especially important to stay hydrated and use skin protection.
explainSensor2 = Pollution is measured via the Air Quality Index (AQI). A UV Index above 6 requires sun protection, even on cool or cloudy days, as clouds often do not block the harmful UVA/UVB rays shown in the trends above.
explainTraffic1 = Exposure to high pollution levels during peak traffic hours can increase respiratory strain by up to 30% during outdoor exercise.
explainTraffic2 = Real-time sensor data is synced every 5 minutes with the Antwerp Traffic data and local environmental sensors.