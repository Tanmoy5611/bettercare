explainSensor1 = W\u00E4hrend die Verschmutzung Ihr Atmungssystem belastet, erfasst der UV-Index hautsch\u00E4digende Strahlung. Hohe Werte von beidem gleichzeitig erzeugen "oxidativen Stress", weshalb es besonders wichtig ist, ausreichend Wasser zu trinken und Sonnenschutz zu verwenden.
explainSensor2 = Die Verschmutzung wird \u00FCber den Luftqualit\u00E4tsindex (AQI) gemessen. Ein UV-Index \u00FCber 6 erfordert Sonnenschutz, selbst an k\u00FChlen oder bew\u00F6lkten Tagen, da Wolken die sch\u00E4dlichen UVA/UVB-Strahlen in den obigen Trends oft nicht blockieren.
explainTraffic1 = Die Belastung durch hohe Verschmutzungswerte w\u00E4hrend der Hauptverkehrszeiten kann die Atembelastung bei sportlichen Aktivit\u00E4ten im Freien um bis zu 30% erh\u00F6hen.
explainTraffic2 = Echtzeit-Sensordaten werden alle 5 Minuten mit den Antwerpener Verkehrsdaten und lokalen Umweltsensoren synchronisiert.