explainSensor1 = Tandis que la pollution affecte votre syst\u00E8me respiratoire, l'indice UV surveille les rayonnements nocifs pour la peau. Des niveaux \u00E9lev\u00E9s des deux simultan\u00E9ment cr\u00E9ent un "stress oxydatif", il est donc particuli\u00E8rement important de rester hydrat\u00E9 et d'utiliser une protection cutan\u00E9e.
explainSensor2 = La pollution est mesur\u00E9e via l'indice de qualit\u00E9 de l'air (AQI). Un indice UV sup\u00E9rieur \u00E0 6 n\u00E9cessite une protection solaire, m\u00EAme par temps frais ou nuageux, car les nuages ne bloquent souvent pas les rayons UVA/UVB nocifs pr\u00E9sent\u00E9s dans les tendances ci-dessus.
explainTraffic1 = L'exposition \u00E0 des niveaux de pollution \u00E9lev\u00E9s pendant les heures de pointe peut augmenter la fatigue respiratoire jusqu'\u00E0 30% lors d'activit\u00E9s physiques en plein air.
explainTraffic2 = Les donn\u00E9es des capteurs en temps r\u00E9el sont synchronis\u00E9es toutes les 5 minutes avec les donn\u00E9es de trafic d'Anvers et les capteurs environnementaux locaux.